<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universidades de Chihuahua | Brisa Marina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden-content { display: none; }
        .rotate-icon { transform: rotate(180deg); }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900">

    <header class="bg-gradient-to-r from-blue-900 to-indigo-800 text-white py-16 px-6 text-center shadow-2xl">
        <h1 class="text-5xl font-black mb-4 tracking-tight">Universidades de Chihuahua 🎓</h1>
        <p class="text-blue-100 max-w-2xl mx-auto text-lg italic">"Ayudando a los jóvenes a encontrar su futuro." - Brisa Marina Chávez</p>
        <div class="mt-6">
            <a href="https://instagram.com/Unisbybree" target="_blank" class="bg-white text-blue-900 hover:bg-pink-500 hover:text-white px-6 py-3 rounded-full text-sm font-bold transition-all shadow-md">
                📱 Sigue a @Unisbybree
            </a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto py-12 px-6">
        <div class="relative max-w-2xl mx-auto mb-12">
            <input type="text" id="buscador" onkeyup="filtrar()" placeholder="Escribe una carrera (ej. Medicina, Aeroespacial...)" 
                   class="w-full p-5 pl-12 rounded-2xl border-none shadow-xl focus:ring-4 focus:ring-blue-400 outline-none text-lg">
            <span class="absolute left-4 top-5 text-slate-400 text-xl">🔍</span>
        </div>

        <div id="lista-universidades" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
